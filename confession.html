<!DOCTYPE html>
<html>
<head>

<title>Confession</title>

<style>

body{
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:50px;
color:#ff4d88;
text-shadow:0 0 20px pink;
}

.heart{
position:fixed;
bottom:-30px;
color:#ff4d88;
font-size:25px;
animation:rise 6s linear infinite;
}

@keyframes rise{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}

</style>

</head>

<body>

<h1>I LOVE YOU SAKSHI ❤️</h1>

<script>

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,200);

</script>

</body>
</html>
