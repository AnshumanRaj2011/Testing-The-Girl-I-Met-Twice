<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Confession</title><style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffb6c1,#ffd6e7,#ffeaf4);
overflow:hidden;
font-family:'Playfair Display',serif;
}

/* Countdown */

#countdown{
font-size:120px;
color:#ff2e6e;
text-shadow:
0 0 10px pink,
0 0 20px #ff4da6,
0 0 40px #ff80bf;
animation:pulse 1s infinite alternate;
z-index:5;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* Confession text */

#loveText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.8);
font-size:64px;
color:#ff0066;
font-style:italic;
text-align:center;
opacity:0;
transition:1.5s;
text-shadow:
0 0 15px pink,
0 0 30px #ff4da6,
0 0 60px #ff66cc,
0 0 80px #ff99dd;
}

#loveText.show{
opacity:1;
transform:translate(-50%,-50%) scale(1.2);
}

/* Floating hearts */

.bg-heart{
position:fixed;
bottom:-80px;
color:#ff4da6;
font-size:22px;
opacity:0.8;
pointer-events:none;
animation:floatHeart linear forwards;
}

@keyframes floatHeart{
0%{transform:translateY(0) scale(0.6);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}

/* Snowfall hearts */

.snow-heart{
position:fixed;
top:-20px;
color:#ff4da6;
font-size:18px;
pointer-events:none;
opacity:0.85;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

/* Mobile optimization */

@media (max-width:600px){

#countdown{font-size:80px;}
#loveText{font-size:36px;}

}

</style></head><body><div id="countdown">3</div><div id="loveText"><i>I Love You Sakshi</i></div><audio id="loveAudio" preload="auto">
<source src="FirstTry.mp3" type="audio/mp4">
</audio><script>

let count = 3;

const counter = document.getElementById("countdown");
const love = document.getElementById("loveText");
const audio = document.getElementById("loveAudio");

/* unlock audio for mobile */

document.addEventListener("touchstart", function unlock(){
audio.play().then(()=>{
audio.pause();
audio.currentTime = 0;
}).catch(()=>{});
document.removeEventListener("touchstart", unlock);
});

/* countdown */

const timer = setInterval(()=>{

if(count > 0){
counter.innerHTML = count;
}

if(count === 0){

counter.innerHTML="💗";

setTimeout(()=>{

counter.style.display="none";

love.classList.add("show");

/* play audio */

audio.currentTime=0;
audio.volume=1;
audio.play().catch(()=>{});

/* floating hearts */

setInterval(createBgHeart,500);

},800);

clearInterval(timer);

}

count--;

},1000);

/* floating hearts */

function createBgHeart(){

const heart=document.createElement("div");
heart.classList.add("bg-heart");
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(18+Math.random()*26)+"px";
heart.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},11000);

}

/* snowfall hearts */

function createSnowHeart(){

const heart=document.createElement("div");
heart.classList.add("snow-heart");
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(12+Math.random()*18)+"px";
heart.style.animationDuration=(6+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},10000);

}

/* start snowfall after audio */

audio.addEventListener("ended",()=>{
setInterval(createSnowHeart,120);
});

</script></body>
</html>
